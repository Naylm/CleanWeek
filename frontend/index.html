<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#6C63FF" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CleanWeek" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <title>CleanWeek</title>
  </head>
  <body>
    <div id="root">
      <style>
        .initial-loader {
          position: fixed; inset: 0; display: flex; flex-direction: column;
          align-items: center; justify-content: center; background: #0F0F1A;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .initial-loader .logo { font-size: 48px; margin-bottom: 12px; }
        .initial-loader h1 {
          font-size: 24px; font-weight: 700; color: #EAEAEA; margin: 0;
          background: linear-gradient(135deg, #6C63FF, #FF6584);
          -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
        }
      </style>
      <div class="initial-loader">
        <div class="logo">🧹</div>
        <h1>CleanWeek</h1>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
