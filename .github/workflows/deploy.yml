name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
        env:
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}

      - name: Create deploy tarball
        run: |
          mkdir -p deploy/frontend deploy/backend
          cp -r frontend/dist/* deploy/frontend/
          cp -r backend/src deploy/backend/
          cp backend/package.json deploy/backend/
          tar -czf deploy.tar.gz -C deploy .

      - name: Upload tarball to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "deploy.tar.gz"
          target: "/tmp/"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            rm -rf /tmp/cleanweek-deploy
            mkdir -p /tmp/cleanweek-deploy
            tar -xzf /tmp/deploy.tar.gz -C /tmp/cleanweek-deploy

            cp -r /tmp/cleanweek-deploy/frontend/* /var/www/cleanweek/frontend/dist/
            cp -r /tmp/cleanweek-deploy/backend/src /var/www/cleanweek/backend/
            cp /tmp/cleanweek-deploy/backend/package.json /var/www/cleanweek/backend/

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            cd /var/www/cleanweek/backend
            npm install
            pm2 restart cleanweek-backend || pm2 start src/index.js --name cleanweek-backend
            pm2 save

            rm -f /tmp/deploy.tar.gz
            rm -rf /tmp/cleanweek-deploy
